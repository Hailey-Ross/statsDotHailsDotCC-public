time-format %s
date-format %s
log-format {"ts":"%x","request":{"client_ip":"%h","proto":"%H","method":"%m","host":"%v","uri":"%U","headers":{"User-Agent":["%u"],"Referer":["%R"]},"tls":{"version":"%K"}},"duration":"%D","size":"%b","status":"%s","resp_headers":{"Content-Type":["%M"]}}
enable-panel VIRTUAL_HOSTS
real-os true
geoip-database /var/lib/GeoIP/dbip-country.mmdb
geoip-database /var/lib/GeoIP/dbip-asn.mmdb

# Humans only: drop known crawlers, and treat unknown OS plus unknown browser as crawlers too.
ignore-crawlers true
unknowns-as-crawlers true

# Extra columns (Method, Protocol), decode double encoded agents and URLs, and route
# query stringed assets into the Static panel.
http-method true
http-protocol true
double-decode true
all-static-files true

# Dark theme, 48 rows per panel. autoHideTables collapses tables on the aggregate dashboard,
# the per panel pages override this back to expanded with their own html-prefs in hails-stats.sh.
html-prefs {"theme":"darkBlue","perPage":48,"layout":"horizontal","autoHideTables":true}

# Custom skin, loaded after GoAccess's own stylesheet. Fetched by URL, so it must live in the web root.
html-custom-css /custom.css
